<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Combustible</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Calculadora de Combustible</h1>

<div class="formulario">

<label>Distancia del viaje (km)</label>
<input type="number" id="distancia" placeholder="Ej: 350">

<label>Consumo del auto (L / 100km)</label>
<input type="number" id="consumo" placeholder="Ej: 8">

<label>Precio del litro de nafta</label>
<input type="number" id="precio" placeholder="Ej: 950">

<div class="botones">
<button onclick="calcular()">Calcular</button>
<button onclick="limpiar()" class="limpiar">Limpiar</button>
</div>

</div>

<div class="resultado" id="resultado">
Ingresa los datos para calcular el costo del viaje
</div>

</div>

<script src="script.js"></script>

</body>
</html>
